## YAML Template.
---
name: Dependent Jobs Workflow

on:
  push:
    branches:
      - master

jobs:

  build:
    name: Build Job
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Print Build Start Message
        run: echo "Building application..."

      - name: Simulate Build Process
        run: sleep 2


  test:
    name: Test Job
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Print Test Start Message
        run: echo "Running tests..."

      - name: Simulate Testing Process
        run: sleep 2


  deploy:
    name: Deploy Job
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Print Deploy Start Message
        run: echo "Deploying application..."

      - name: Simulate Deployment Process
        run: sleep 2